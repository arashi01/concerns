name: 'Integration Build'

on:
  workflow_dispatch:
  pull_request:
    branches: [devel, main]
    paths-ignore:
      - '**.md'
  push:
    branches: [devel, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_LTS: 24

jobs:
  static_analysis:
    name: Static Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_LTS }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_LTS }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify Formatting
        id: format
        continue-on-error: true
        run: npm run format:check

      - name: Verify Type Safety
        id: typecheck
        continue-on-error: true
        run: npm run typecheck

      - name: Verify Linting Conformity
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Check for Failures
        if: always()
        run: |
          failed=""
          [[ "${{ steps.format.outcome }}" == "failure" ]] && failed="$failed format"
          [[ "${{ steps.typecheck.outcome }}" == "failure" ]] && failed="$failed typecheck"
          [[ "${{ steps.lint.outcome }}" == "failure" ]] && failed="$failed lint"
          if [[ -n "$failed" ]]; then
            echo "::error::Static analysis checks failed:$failed"
            exit 1
          fi

  test:
    name: Execute Tests (Node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        node: [24]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Execute Unit Tests
        run: npm test

  build:
    name: Build & Assemble Forge Project
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_LTS }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_LTS }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build & Prepare Forge Project
        run: npm run forge:prepare

      - name: Upload Build Artefacts
        uses: actions/upload-artifact@v7
        with:
          name: forge-build
          path: forge-build/
          retention-days: 7

  deploy:
    name: Deploy to Forge
    needs:
      - static_analysis
      - test
      - build
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Build Artefacts
        uses: actions/download-artifact@v7
        with:
          name: forge-build
          path: forge-build/

      - name: Determine Forge Environment
        id: env
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            echo "forge_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "forge_env=development" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Forge CLI
        run: |
          npm install -g @forge/cli
          forge settings set usage-analytics false

      - name: Deploy
        run: cd forge-build && forge deploy -e ${{ steps.env.outputs.forge_env }} --non-interactive
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}

      - name: Determine Release Tag
        if: github.ref == 'refs/heads/main'
        id: version
        run: |
          forge_major=$(cd forge-build && forge version list --json -e production \
            | jq -r '.[0].version')
          if [[ -z "$forge_major" || "$forge_major" == "null" ]]; then
            echo "::error::Failed to retrieve Forge version"
            exit 1
          fi
          short_sha="${GITHUB_SHA::7}"
          tag="v${forge_major}.${short_sha}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
